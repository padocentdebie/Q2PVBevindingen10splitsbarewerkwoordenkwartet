            {p: "dGVnZW4=", z: "WmlqIGRpZW5kZSBlZW4ga2xhY2h0IGluIHRlZ2VuIGRlIGtvcnBzY2hlZi4="},
            {p: "YWFu", z: "SG91ZCBqZSBhbHRpamQgYWFuIGRlIHZlcmtZcnNyZWdlbHMu"},

            {p: "bmFhcg==", z: "RXIgd29yZHQgb25kZXJ6b2VrIGdlZGFhbiBuYWFyIGRlIG9vcnphYWsu"},
            {p: "b3Zlcg==", z: "V2UgbW9ldGVuIG5hZGVua2VuIG92ZXIgZGUgc3RyYXRlZ2llLg=="},

        ];

        const dec = (s) => atob(s);
        document.addEventListener('keydown', e => { if (e.ctrlKey && (e.key === 'u' || e.key === 'c' || e.key === 'i') || e.key === 'F12') e.preventDefault(); });
        document.oncontextmenu = () => false;

        window.startDienst = () => {
            const n = document.getElementById('naam').value.trim().toUpperCase();
            const k = document.getElementById('klasSelect').value;
            if(!n) return;
            window.user = { naam: n, klas: k };
            document.getElementById('auth').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            assignCard(); loadLeaderboard(); listenToKlas(); listenToAlerts();
        };

        function assignCard() {
            const isP = Math.random() > 0.5;
            const item = rawDB[Math.floor(Math.random() * rawDB.length)];
            window.current = { p: dec(item.p), z: dec(item.z), type: isP ? 'P' : 'Z' };
            render();
        }

        function render() {
            const main = document.getElementById('main-card');
            const interaction = document.getElementById('interaction-area');
            if(window.current.type === 'P') {
                main.innerHTML = `<div class="bg-[#002d5e] text-white p-12 rounded-[3rem] card-shadow text-center border-b-8 border-yellow-500">
                    <span class="text-[10px] font-black opacity-40 uppercase tracking-widest italic">Voorzetsel-Agent</span>
                    <h2 class="text-7xl font-black italic my-6">${window.current.p.toUpperCase()}</h2>
                </div>`;
                interaction.innerHTML = `<div id="feed" class="grid gap-3 mt-6"></div>`;
            } else {
                const gat = window.current.z.replace(new RegExp(window.current.p, 'gi'), "___");
                main.innerHTML = `<div class="bg-white p-12 rounded-[3rem] shadow-xl border-4 border-[#002d5e] text-center">
                    <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest italic">Informatie-Bron</span>
                    <h2 class="text-xl font-bold italic my-6 text-[#002d5e]">"${gat}"</h2>
                    <button onclick="share()" class="bg-[#002d5e] text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg active:scale-95 transition-all">Deel met Unit</button>
                </div>`;
                interaction.innerHTML = `<p class="text-center text-slate-400 font-bold text-[8px] uppercase mt-10 italic">Wacht op koppeling door partner...</p>`;
            }
        }

        window.share = () => {
            push(ref(db, `lessen/${window.user.klas}/shared`), { sender: window.user.naam, z: window.current.z, p: window.current.p });
            alert("Informatie gedeeld!");
        };

        function listenToKlas() {
            onValue(ref(db, `lessen/${window.user.klas}/shared`), (snap) => {
                if(!window.current || window.current.type !== 'P') return;
                const feed = document.getElementById('feed'); feed.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.entries(data).forEach(([id, val]) => {
                        const b = document.createElement('button');
                        b.className = "w-full p-5 bg-white border-2 border-slate-100 rounded-3xl text-left text-[11px] font-bold hover:border-[#002d5e] transition-all flex justify-between items-center shadow-sm";
                        b.innerHTML = `<span>${val.z}</span><span class="text-[8px] text-slate-300 uppercase">${val.sender}</span>`;
                        b.onclick = () => {
                            if(val.p.toLowerCase() === window.current.p.toLowerCase()) {
                                const pk = val.p.toLowerCase();
                                set(ref(db, `lessen/${window.user.klas}/scores/${window.user.naam}`), increment(1));
                                const kRef = ref(db, `lessen/${window.user.klas}/kwartetten/${pk}`);
                                set(kRef, increment(1));
                                onValue(kRef, (s) => { 
                                    if(s.val() === 4) { 
                                        push(ref(db, `lessen/${window.user.klas}/alerts`), { msg: `🚨 KWARTET '${pk.toUpperCase()}'! +5 BONUS VOOR ${window.user.naam} 🚨` });
                                        set(ref(db, `lessen/${window.user.klas}/scores/${window.user.naam}`), increment(5));
                                        set(kRef, 0);
                                    }
                                }, {onlyOnce: true});
                                remove(ref(db, `lessen/${window.user.klas}/shared/${id}`));
                                assignCard();
                            } else { alert("Foutieve match."); }
                        };
                        feed.appendChild(b);
                    });
                }
            });
        }

        function listenToAlerts() {
            onValue(ref(db, `lessen/${window.user.klas}/alerts`), (snap) => {
                const data = snap.val();
                if(data) {
                    const last = Object.values(data).pop();
                    const a = document.getElementById('alert-box');
                    a.innerText = last.msg; a.classList.remove('hidden');
                    setTimeout(() => a.classList.add('hidden'), 5000);
                }
            });
        }

        function loadLeaderboard() {
            onValue(ref(db, `lessen/${window.user.klas}/scores`), (snap) => {
                const l = document.getElementById('leaderboard'); l.innerHTML = "";
                const d = snap.val();
                if(d) Object.entries(d).sort((a,b)=>b[1]-a[1]).forEach(([n,s]) => {
                    l.innerHTML += `<div class="flex justify-between p-4 bg-slate-50 mb-2 rounded-2xl border-r-4 border-[#002d5e] font-black text-[10px]"><span>${n}</span><span>${s} PTS</span></div>`;
                });
            });
        }
    </script>

<body class="p-4">
    <div id="alert-box" class="hidden fixed top-4 left-1/2 -translate-x-1/2 z-[60] bg-yellow-400 text-[#002d5e] px-8 py-4 rounded-full font-black text-xs kwartet-alert shadow-2xl border-2 border-white"></div>

    <div id="auth" class="fixed inset-0 bg-[#002d5e] z-50 flex items-center justify-center p-6">
        <div class="bg-white p-12 rounded-[4rem] w-full max-w-sm text-center shadow-2xl">
            <h1 class="text-4xl font-black italic text-[#002d5e] mb-10 uppercase tracking-tighter">UNIT SYNC</h1>
            <input type="text" id="naam" placeholder="AGENT NAAM" class="w-full bg-slate-50 p-5 rounded-2xl mb-4 font-bold uppercase text-xs outline-none">
            <select id="klasSelect" class="w-full bg-slate-50 p-5 rounded-2xl mb-10 font-bold uppercase text-xs outline-none">
                <option value="ALFA">UNIT ALFA</option><option value="BRAVO">UNIT BRAVO</option><option value="CHARLIE">UNIT CHARLIE</option><option value="DELTA">UNIT DELTA</option>
            </select>
            <button onclick="startDienst()" class="w-full bg-[#002d5e] text-white p-5 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Start Patrouille</button>
        </div>
    </div>

    <div id="app" class="hidden max-w-5xl mx-auto pt-10 grid lg:grid-cols-12 gap-10">
        <div class="lg:col-span-8">
            <div id="main-card"></div>
            <div id="interaction-area"></div>
        </div>
        <aside class="lg:col-span-4 bg-white p-8 rounded-[3rem] shadow-xl border-t-8 border-[#002d5e]">
            <h3 class="font-black text-[#002d5e] uppercase italic text-center mb-8 text-xs border-b pb-4">Unit Ranking</h3>
            <div id="leaderboard"></div>
        </aside>
    </div>
</body>
</html>
