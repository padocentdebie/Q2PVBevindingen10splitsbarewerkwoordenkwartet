<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTV SSplitsbare werkwoorden kwartetn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Harde blokkade op selectie en interactie */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background-color: #f1f5f9;
        }
        .no-inspect { pointer-events: none; }
        .interactive-card { pointer-events: auto; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, increment, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBEod8zm1jvvkmPbe6cA_SQo2U_esC9yTY",
            databaseURL: "https://aangiftebotje-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aangiftebotje"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Versleutelde Database (Base64)
        const encryptedData = [
            {p: "b3A=", z: "RGUgYWdlbnQgbW9ldCBnb2VkIGxldHRlbiBvcCBzbGluZ2VyZW5kIGdlZHJhZy4="},
            {p: "b3A=", z: "V2Ugd2FjaHRlbiBvcCB0b2VzdGVtbWluZyB2YW4gZGUgb2ZmaWNpZXIu"},
            {p: "dmFu", z: "RGUgbWFuIHdlcmQgYmVzY2h1bGRpZ2QgdmFuIHp3YXJlIG1pc2RocmlmYmVyZWlkLg=="},
            {p: "dGVnZW4=", z: "SGlqIHZlcnpldHRlIHppY2ggdGVnZW4gemlqbiBhYW5ob3VkaW5nLg=="},
            {p: "Ymlq", z: "V2llIHdhcyBlciBiZXRyb2trZW4gYmlqIGRlemUgYWFucmlqZGluZz8="},
            {p: "Ymlq", z: "RGUgaHVscyB3ZXJkIGdldm9uZGVuIGJpaiBoZXQgc2xhY2h0b2ZmZXIu"},
            {p: "bmFhcg==", z: "V2lqIHppam4gbm9nIG9wIHpvZWsgbmFhciBkZSBlaWdlbmFhci4="},
            {p: "b3Zlcg==", z: "RGUgYnV1cnQga2xhYWd0IGFsIHdla2VuIG92ZXIgZ2VsdWlkc292ZXJsYXN0Lg=="},
            {p: "bWV0", z: "RGUgb3ZlcnZhbGxlciBkcmVpZ2RlIG1ldCBlZW4gdnV1cndhcGVuLg=="},
            {p: "dm9vcg==", z: "QmVkYW5rdCB2b29yIHV3IG1lZGV3ZXJraW5nIGFhbiBkaXQgb25kZXJ6b2VrLg=="}
            // De rest van de 40 items worden hier analoog toegevoegd in de definitieve versie
        ];

        // Decryptie functie
        const decode = (str) => decodeURIComponent(escape(window.atob(str)));

        // Anti-Inspectie Scripts
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 'c' || e.key === 'i') || e.key === 'F12') {
                e.preventDefault();
                alert("Systeembeveiliging: Kopiëren niet toegestaan.");
            }
        });
        document.oncontextmenu = () => false;

        window.startDienst = () => {
            const naam = document.getElementById('naam').value.trim().toUpperCase();
            const klas = document.getElementById('klasSelect').value;
            if(!naam) return;
            window.user = { naam, klas };
            assignRandomCard();
            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            loadLeaderboard();
            listenForSharedSentences();
        };

        function assignRandomCard() {
            const isP = Math.random() > 0.5;
            const raw = encryptedData[Math.floor(Math.random() * encryptedData.length)];
            window.currentCard = { p: decode(raw.p), z: decode(raw.z), type: isP ? 'P' : 'Z' };
            renderCard();
        }

        function renderCard() {
            const display = document.getElementById('card-display');
            const action = document.getElementById('action-area');
            
            if(window.currentCard.type === 'P') {
                display.innerHTML = `
                    <div class="bg-[#002d5e] text-white p-12 rounded-[3rem] shadow-2xl text-center border-b-8 border-yellow-500 interactive-card">
                        <span class="text-[10px] font-black opacity-40 uppercase tracking-widest">Actief Voorzetsel</span>
                        <h2 class="text-7xl font-black italic my-6">${window.currentCard.p.toUpperCase()}</h2>
                    </div>`;
                action.innerHTML = `<div id="shared-list" class="grid gap-3 interactive-card"></div>`;
            } else {
                const gat = window.currentCard.z.replace(new RegExp(window.currentCard.p, 'i'), "___");
                display.innerHTML = `
                    <div class="bg-white p-12 rounded-[3rem] shadow-xl border-4 border-[#002d5e] text-center interactive-card">
                        <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Jouw Bewijsstuk</span>
                        <h2 class="text-xl font-bold italic my-6 text-[#002d5e]">"${gat}"</h2>
                        <button onclick="shareSentence()" class="bg-[#002d5e] text-white px-8 py-4 rounded-2xl font-black text-[10px] uppercase">Verzend naar Klas</button>
                    </div>`;
                action.innerHTML = `<p class="text-center text-slate-400 font-bold text-[8px] uppercase italic">Wacht op koppeling...</p>`;
            }
        }

        window.shareSentence = () => {
            push(ref(db, `lessen/${window.user.klas}/shared`), {
                sender: window.user.naam,
                fullZin: window.currentCard.z,
                p: window.currentCard.p
            });
            alert("Informatie gedeeld met de eenheid.");
        };

        function listenForSharedSentences() {
            onValue(ref(db, `lessen/${window.user.klas}/shared`), (snap) => {
                if(!window.currentCard || window.currentCard.type !== 'P') return;
                const list = document.getElementById('shared-list');
                list.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.entries(data).forEach(([key, val]) => {
                        const btn = document.createElement('button');
                        btn.className = "w-full p-5 bg-white border-2 border-slate-100 rounded-3xl text-left text-[11px] font-bold hover:border-[#002d5e] transition-all flex justify-between items-center shadow-sm";
                        btn.innerHTML = `<span>${val.fullZin}</span><span class="text-[8px] text-slate-300 uppercase">${val.sender}</span>`;
                        btn.onclick = () => {
                            if(val.p === window.currentCard.p) {
                                set(ref(db, `lessen/${window.user.klas}/scores/${window.user.naam}`), increment(1));
                                remove(ref(db, `lessen/${window.user.klas}/shared/${key}`)); 
                                assignRandomCard();
                            } else {
                                alert("Geen match.");
                            }
                        };
                        list.appendChild(btn);
                    });
                }
            });
        }

        function loadLeaderboard() {
            onValue(ref(db, `lessen/${window.user.klas}/scores`), (snap) => {
                const list = document.getElementById('ranking');
                list.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.entries(data).sort((a,b) => b[1] - a[1]).forEach(([naam, score]) => {
                        list.innerHTML += `<div class="flex justify-between p-4 bg-slate-50 mb-3 rounded-2xl border-r-4 border-[#002d5e] font-black text-[10px]"><span>${naam}</span><span>${score} PTS</span></div>`;
                    });
                }
            });
        }
    </script>
</head>
<body class="p-4">
    <div id="auth" class="fixed inset-0 bg-[#002d5e] z-50 flex items-center justify-center p-6">
        <div class="bg-white p-12 rounded-[4rem] w-full max-w-sm text-center shadow-2xl">
            <h1 class="text-3xl font-black italic text-[#002d5e] mb-10 uppercase tracking-tighter">BTV SECURE</h1>
            <input type="text" id="naam" placeholder="AGENT NAAM" class="w-full bg-slate-50 p-5 rounded-2xl mb-4 font-bold uppercase text-xs outline-none">
            <select id="klasSelect" class="w-full bg-slate-50 p-5 rounded-2xl mb-10 font-bold uppercase text-xs outline-none">
                <option value="ALFA">UNIT ALFA</option><option value="BRAVO">UNIT BRAVO</option>
                </select>
            <button onclick="startDienst()" class="w-full bg-[#002d5e] text-white p-5 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Start Spel</button>
        </div>
    </div>

    <div id="app" class="hidden max-w-5xl mx-auto pt-10 grid lg:grid-cols-12 gap-10">
        <div class="lg:col-span-8">
            <div id="card-display" class="mb-8"></div>
            <div id="action-area" class="p-6"></div>
        </div>
        <aside class="lg:col-span-4 bg-white p-8 rounded-[3rem] shadow-xl">
            <h3 class="font-black text-[#002d5e] uppercase italic text-center mb-8 pb-4 text-xs tracking-widest border-b">Top Agents</h3>
            <div id="ranking"></div>
        </aside>
    </div>
</body>
</html>
